name: Deploy redirect to Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Create redirect site
        run: |
          mkdir -p redirect-site
          cat > redirect-site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0;url=https://www.ebisuda.net/diary/">
            <link rel="canonical" href="https://www.ebisuda.net/diary/">
            <title>Redirecting...</title>
          </head>
          <body>
            <p>Redirecting to <a href="https://www.ebisuda.net/diary/">www.ebisuda.net/diary/</a></p>
            <script>
              var path = window.location.pathname;
              var dest = "https://www.ebisuda.net/diary" + path + window.location.search + window.location.hash;
              window.location.replace(dest);
            </script>
          </body>
          </html>
          HTMLEOF
          cp redirect-site/index.html redirect-site/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./redirect-site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
